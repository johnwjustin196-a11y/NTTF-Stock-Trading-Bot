# =============================================================================
# Stock Trading Bot — settings
# Secrets (API keys) belong in .env, not here.
# =============================================================================

broker:
  # sim | alpaca_paper | alpaca_live
  mode: alpaca_paper
  region: us
  # Slippage applied to sim fills (10 basis points = realistic retail spread)
  sim_slippage_pct: 0.001

trading:
  live_mode: false
  max_positions:
    bullish: 15
    neutral: 10
    volatile: 5
    bearish: 5
  per_trade_pct: 0.05
  downtrend_size_pct: 0.025
  min_trade_usd: 100
  max_trade_usd: 5000
  risk_per_trade_pct: 0.01
  stop_loss_mode: dynamic
  stop_loss_pct: 0.04
  stop_loss_min_pct: 0.04
  stop_loss_lookback_candles: 5
  stop_loss_timeframe: "15m"
  stop_loss_max_pct: 0.05
  take_profit_pct: 0.05
  ratchet_min_move_pct: 0.025       # Stop only ratchets if price is 2.5%+ above current stop
  ratchet_step_pct: 0.30            # How far to move stop toward price each ratchet (30% of gap)
  trailing_stop:
    enabled_for_small_caps: true
    enabled_for_large_caps: true
    small_cap_price_threshold: 15.0
    large_cap_trail_pct: 0.10
  flatten_on_weak_close: true

  circuit_breaker:
    daily_loss_pct: 0.04          # Stop new entries + tighten stops when day loss >= 4%
    stop_tighten_factor: 0.5      # New stop = price - (price - old_stop) * factor (halves gap)

  earnings:
    blackout_days: 3              # Block new entry this many days before earnings
    min_news_score_to_trade: 0.5  # Allow entry near earnings only with strong news catalyst

  gap:
    up_threshold_pct: 0.05        # Gap-up flag if price > prev_close * (1 + threshold)
    min_news_score: 0.40          # Min news score required to take a gap-up trade

  volume:
    min_ratio: 0.35               # Skip BUY if today_volume < avg_volume * min_ratio

  min_hold_hours_before_llm_close: 3.0  # LLM cannot close a position younger than this unless confidence >= 85%

  position_review:
    max_age_days: 5               # Run LLM re-evaluation on positions held this long

  news_urgency:
    lookback_hours: 2.0           # Short window for intraday sentiment spike detection
    min_score_to_flag: -0.50      # Flag as urgent if 2h window score < this
  buy_threshold: 0.35
  sell_threshold: -0.35
  min_price_for_buy: 5.0            # Hard veto at execution — screener filter alone is not enough
  max_daily_stops_per_symbol: 1     # After 1 stop-out on a symbol today, don't re-enter it
  same_day_reentry_blocked: true    # Block re-buying any ticker that was closed (by any reason) earlier today
  min_entry_tech_score: 0.05        # BUY blocked if technical score is below this (filters noise entries)

  cull:
    premarket_weak_threshold: -0.10  # Drop ticker if tech*0.6 + news*0.4 < this
    min_deep_score: 55               # Drop ticker if deep score < this (mirrors deep gate)
  regime_size_multiplier:
    bullish: 1.0
    neutral: 1.0
    volatile: 0.5
    bearish: 0.5
  skip_weak_in_adverse_regimes: true
  adverse_regimes: [bearish, volatile]

